name: CI

# deploy is neither a Python app nor a compose project, so it doesn't use the
# nos-tromo/.github reusable workflows. It just needs its shell + Makefile linted.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        run: shellcheck scripts/*.sh

  makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Makefile parses + compose helper expands
        # `make help` validates that the whole Makefile parses; `make -n ps`
        # exercises the $(call compose,...) helper without needing the member
        # repos to be present on the runner (ps has no sub-make prerequisites).
        run: |
          make help >/dev/null
          make -n ps >/dev/null
          echo "Makefile OK"

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install yamllint
        run: pipx install yamllint
      - name: Lint workflow YAML
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable}}" .github/
