name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # shellcheck (scripts/*.sh) + yamllint come from the shared infra-validation
  # workflow. The other jobs skip automatically: compose-config because deploy
  # passes no compose-files (it owns no compose, it only sequences the members');
  # hadolint because there are no Dockerfiles; make-common because deploy does
  # not vendor make/common.mk.
  validate:
    uses: nos-tromo/.github/.github/workflows/infra-validation.yml@ci/add-node-lib-workflow

  # Bespoke and intentionally not shared — no reusable workflow covers it:
  # validates that the orchestration Makefile parses (`make help`) and that the
  # $(call compose,...) helper expands (`make -n ps`, which has no sub-make
  # prerequisites so it needs none of the member repos present on the runner).
  makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Makefile parses + compose helper expands
        run: |
          make help >/dev/null
          make -n ps >/dev/null
          echo "Makefile OK"
